<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trending Outfit 2.0</title>

<style>
body { margin:0; font-family:Arial; background:#fff; }

header {
  background:#0f3d2e;
  color:#fff;
  padding:15px;
  text-align:center;
}

.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  text-align:center;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

button {
  background:#0f3d2e;
  color:white;
  border:none;
  padding:10px;
  margin-top:5px;
  border-radius:5px;
  cursor:pointer;
}

.whatsapp { background:#25D366; }

.form-box {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
  width:90%;
  max-width:300px;
}

input {
  width:100%;
  padding:8px;
  margin:5px 0;
}

</style>
</head>

<body>

<header>
<h2>Trending Outfit 2.0</h2>
<p>Only Delivery in India 🇮🇳</p>
</header>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1511376777868-611b54f68947">
<h3>Premium Watch</h3>
<p>₹1999</p>
<button onclick="openForm('Watch',1999)">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Shoes</h3>
<p>₹2499</p>
<button onclick="openForm('Shoes',2499)">Buy Now</button>
</div>

</div>

<!-- FORM -->
<div class="form-box" id="formBox">
<h3>Enter Details</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="address" placeholder="Address">

<button onclick="payNow()">Pay Now</button>
<button class="whatsapp" onclick="whatsappOrder()">Order on WhatsApp</button>
<button onclick="closeForm()">Cancel</button>
</div>

<script>
let productName = "";
let productPrice = "";

function openForm(name, price) {
  productName = name;
  productPrice = price;
  document.getElementById("formBox").style.display = "block";
}

function closeForm() {
  document.getElementById("formBox").style.display = "none";
}

function payNow() {
  let upi = "9817175353-3@ybl";
  let url = `upi://pay?pa=${upi}&pn=Trending Outfit&tn=Buy ${productName}&am=${productPrice}&cu=INR`;
  window.location.href = url;
}

function whatsappOrder() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  let msg = `Order Details:%0AProduct: ${productName}%0APrice: ₹${productPrice}%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}`;

  window.open(`https://wa.me/919817175353?text=${msg}`);
}
</script>

</body>
</html>
